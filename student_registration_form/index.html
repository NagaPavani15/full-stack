<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration | Veltech</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <h2>Student Registration</h2>
        <form id="registrationForm">
            <div class="input-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name">
                <small class="error-msg" id="nameError"></small>
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="text" id="email" placeholder="example@veltech.edu.in">
                <small class="error-msg" id="emailError"></small>
            </div>

            <div class="input-group">
                <label for="phone">Phone Number</label>
                <input type="text" id="phone" placeholder="10-digit mobile number">
                <small class="error-msg" id="phoneError"></small>
            </div>

            <div class="input-group">
                <label>Gender</label>
                <div class="radio-group">
                    <input type="radio" name="gender" value="male" id="male"> <label for="male">Male</label>
                    <input type="radio" name="gender" value="female" id="female"> <label for="female">Female</label>
                </div>
                <small class="error-msg" id="genderError"></small>
            </div>

            <div class="input-group">
                <label for="course">Select Course</label>
                <select id="course">
                    <option value="">-- Choose Course --</option>
                    <option value="btech">B.Tech CSE</option>
                    <option value="ece">B.Tech ECE</option>
                    <option value="mech">B.Tech MECH</option>
                </select>
                <small class="error-msg" id="courseError"></small>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="At least 8 characters">
                <small class="error-msg" id="passwordError"></small>
            </div>

            <button type="submit" class="submit-btn">Register Now</button>
        </form>
        <div id="successMessage" class="success-box" style="display: none;">
            Registration Successful! Welcome, Student.
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
